#import:
#  - /path/to/alacritty.yml

window:
  padding:
    x: 10
    y: 10
  opacity: 0.85
  startup_mode: Maximized
font:
  normal:
    family: Hasklig
    #style: Regular
  #bold:
    #family: monospace
    #style: Bold
  #italic:
    #family: monospace
    #style: Italic
  #bold_italic:
    #family: monospace
    #style: Bold Italic
  size: 14.0

