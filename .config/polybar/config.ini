[colors]
background   = #000000
foreground   = #ffffff

[bar/main]
tray-position = right
width         = 100%
height        = 20
padding-left  = 3
padding-right = 3
monitor    = HDMI-0
background = ${colors.background}
foreground = ${colors.foreground}
border-top-size = 7
border-top-color = ${colors.background}

bottom    = false
line-size = 1

modules-left   = mpv-skip empty-space-1 mpv-pause empty-space-1 mpv
modules-center = time empty-space-1 empty-space-1 weather
modules-right  = network empty-space-1 cpu empty-space-1 mem empty-space-1
font-0         = unscii:style=Bold:pixelsize=13
font-1         = Hasklug Nerd Font:style=Bold:pixelsize=12

[module/empty-space-1]
type    = custom/text
content = " "

[module/empty-space-2]
type    = custom/text
content = "  "

[module/empty-space-3]
type    = custom/text
content = "  "

[module/weather]
type              = custom/script
exec              = ~/.config/polybar/scripts/get_weather.sh 2>/dev/null
label             = %output% %{T2}糖%{T-}
format            = <label>
interval          = 300

[module/mpv-skip]
type              = custom/text
content           = %{T2}ﭡ%{T-}
click-left        = ~/.config/polybar/scripts/mpv/skip.sh 2>/dev/null

[module/mpv-pause]
type              = custom/text
content           = %{T2}%{T-}
click-left        = ~/.config/polybar/scripts/mpv/pause.sh 2>/dev/null

[module/mpv]
type              = custom/script
exec              = ~/.config/polybar/scripts/mpv/current.sh 2>/dev/null
label             = %{T3} %output::80%%{T-}
format            = <label>
interval          = 5

[module/time]
type              = internal/date
interval          = 5
date              =  %a, %d.%m.%Y%{F-}
time              =  %H:%M%{F-}
label             = %date%  %time%
format            = <label>

[module/mem]
type              = internal/memory
interval          = 2
label             = "  %percentage_used%%"
label-padding     = 1

[module/network]
type              = internal/network
interface         = enp3s0
interval          = 3
label-connected   = " %downspeed:7:7%  %upspeed:7:7%"

[module/cpu]
type     = internal/cpu
interval = 2

format-prefix = "%{T2} %{T-}" 
format        =  <label> 
label         = %percentage%%

[module/title]
type              = internal/xwindow
format            = <label>
label             =   %title:30:30%
